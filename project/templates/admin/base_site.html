{% extends "admin/base_site.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-soft: #1f2937;
        --line: #334155;
        --text: #f8fafc;
        --muted: #e2e8f0;
        --accent: #2563eb;
    }
    html, body { background: var(--bg) !important; color: var(--text) !important; font-size: 15px; }
    #container, #content, #content-main { background: transparent !important; color: var(--text) !important; }
    #header { background: #0b1220 !important; border-bottom: 1px solid var(--line) !important; }
    #branding h1, #branding h1 a:link, #branding h1 a:visited { color: #fff !important; font-weight: 700; letter-spacing: .2px; }
    #user-tools, #user-tools a { color: #f1f5f9 !important; font-weight: 600; }
    #user-tools { font-size: 13px !important; }
    div.breadcrumbs { background: var(--panel-soft) !important; color: var(--muted) !important; border-bottom: 1px solid var(--line) !important; }
    div.breadcrumbs a { color: #bfdbfe !important; font-weight: 600; }

    .module, .inline-group, .submit-row, #changelist-filter, .dashboard .module {
        background: var(--panel) !important;
        border: 1px solid var(--line) !important;
        border-radius: 10px;
    }
    .module caption, .inline-group h2, .module h2 {
        background: var(--panel-soft) !important;
        color: #fff !important;
        border-bottom: 1px solid var(--line) !important;
        font-weight: 700;
    }

    .form-row, .aligned label, .help, .small, .quiet, p, li, dd, dt, legend {
        color: var(--muted) !important;
        opacity: 1 !important;
    }

    input, textarea, select {
        background: #0b1220 !important;
        color: #fff !important;
        border: 1px solid #64748b !important;
        border-radius: 6px !important;
    }
    input:focus, textarea:focus, select:focus {
        border-color: var(--accent) !important;
        outline: none !important;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.25) !important;
    }

    #changelist table, .results table { background: var(--panel) !important; }
    #changelist table thead th, .results thead th {
        background: #1e293b !important;
        color: #fff !important;
        border-bottom: 1px solid #64748b !important;
        font-weight: 700 !important;
    }
    #changelist table tbody tr:nth-child(odd), .results tbody tr:nth-child(odd) { background: #111827 !important; }
    #changelist table tbody tr:nth-child(even), .results tbody tr:nth-child(even) { background: #0f172a !important; }
    #changelist table tbody td, #changelist table tbody th, .results tbody td, .results tbody th {
        color: #f8fafc !important;
        border-color: var(--line) !important;
        font-weight: 500 !important;
        opacity: 1 !important;
    }

    #changelist-filter h2, #changelist-filter h3, #changelist-filter li, #changelist-filter a, #changelist-filter details, #changelist-filter summary {
        color: #f1f5f9 !important;
        opacity: 1 !important;
    }

    #nav-sidebar, #nav-sidebar .module {
        background: #0f172a !important;
        border-color: var(--line) !important;
    }
    #nav-sidebar .current-app .section,
    #nav-sidebar .model,
    #nav-sidebar tr,
    #nav-sidebar th,
    #nav-sidebar td {
        background: #0f172a !important;
    }
    #nav-sidebar tr:nth-child(even),
    #nav-sidebar tr:nth-child(odd) {
        background: #0f172a !important;
    }
    #nav-sidebar .current-model,
    #nav-sidebar .current-model th,
    #nav-sidebar .current-model td {
        background: #1f2937 !important;
    }
    #nav-sidebar a, #nav-sidebar caption, #nav-sidebar th, #nav-sidebar td {
        color: #f1f5f9 !important;
        opacity: 1 !important;
        font-weight: 600 !important;
        text-decoration: none !important;
        font-size: 14px !important;
    }
    #nav-sidebar a:hover {
        color: #ffffff !important;
        background: #1f2937 !important;
    }
    #nav-filter {
        color: #fff !important;
        border: 1px solid #64748b !important;
        background: #0b1220 !important;
        font-size: 14px !important;
    }

    #changelist table thead th,
    #changelist table tbody td,
    #changelist table tbody th,
    .results table thead th,
    .results table tbody td,
    .results table tbody th,
    #changelist-filter h2,
    #changelist-filter h3,
    #changelist-filter li,
    #changelist-filter a,
    .form-row label,
    .help,
    input, textarea, select {
        font-size: 14px !important;
    }

    a { color: #bfdbfe !important; }
    a:hover { color: #dbeafe !important; }

    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        background: var(--accent) !important;
        color: #fff !important;
        border: 0 !important;
        border-radius: 6px !important;
        font-weight: 700 !important;
    }
    .button:hover, input[type=submit]:hover, input[type=button]:hover, .submit-row input:hover, a.button:hover {
        background: #1d4ed8 !important;
    }
</style>
{% endblock %}
