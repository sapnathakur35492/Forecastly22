<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ blog.meta_title|default:blog.blog_title }} | Forecastly.io</title>
    <meta name="description" content="{{ blog.meta_description }}">
    <meta name="keywords" content="{{ blog.meta_keywords }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A3D62;
            --accent: #42A5F5;
            --gray-100: #F1F5F9;
            --gray-200: #E2E8F0;
            --gray-600: #475569;
            --gray-800: #1E293B;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; color: var(--gray-800); line-height: 1.8; }
        
        .nav { background: #fff; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-size: 1.2rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .back-link { font-size: 0.85rem; font-weight: 600; color: var(--accent); text-decoration: none; }

        .article-header { padding: 4rem 1.5rem 2rem; border-bottom: 1px solid var(--gray-100); background: var(--gray-50); }
        .header-inner { max-width: 800px; margin: 0 auto; text-align: center; }
        .date { font-size: 0.8rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; display: block; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.8rem; color: var(--primary); line-height: 1.2; margin-bottom: 1rem; }

        .content-wrap { max-width: 800px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
        .content { font-size: 1.15rem; color: #334155; white-space: pre-wrap; font-family: 'Inter', sans-serif; }
        
        /* Premium Styling for Content */
        .content p { margin-bottom: 1.8rem; }
        
        .footer-cta { background: var(--gray-100); border-radius: 20px; padding: 2.5rem; margin-top: 4rem; text-align: center; }
        .footer-cta h3 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 1rem; color: var(--primary); }
        .footer-cta p { font-size: 1rem; margin-bottom: 1.5rem; color: var(--gray-600); }
        .cta-btn { background: var(--primary); color: white; padding: 0.8rem 2rem; border-radius: 60px; text-decoration: none; font-weight: 700; display: inline-block; transition: .2s; }
        .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(10, 61, 98, 0.2); }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .article-header { padding: 3rem 1rem 1.5rem; }
            .content { font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="brand">Forecastly.io</a>
            <a href="/blog/" class="back-link">← All Insights</a>
        </div>
    </nav>

    <header class="article-header">
        <div class="header-inner">
            <span class="date">{{ blog.created_at|date:"F d, Y" }}</span>
            <h1>{{ blog.blog_title }}</h1>
        </div>
    </header>

    <main class="content-wrap">
        <div class="content">{{ blog.blog_content }}</div>

        <div class="footer-cta">
            <h3>Need this level of insight for your market?</h3>
            <p>Get analyst-verified data delivered in 60 minutes. Start by building your report now.</p>
            <a href="/" class="cta-btn">Build Your Report →</a>
        </div>
    </main>
</body>
</html>
